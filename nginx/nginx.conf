# }
#
# upstream signoz-query {
#     server signoz-query-service:8080;
# }

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name altahris.com www.altahris.com;
    return 301 https://$host$request_uri;
}

# server {
#     listen 80;
#     server_name signoz.altahris.com;
#     return 301 https://$host$request_uri;
# }

# HTTPS server
server {
    listen 443 ssl;
    server_name altahris.com www.altahris.com;

    ssl_certificate /etc/letsencrypt/live/altahris.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/altahris.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Swagger UI
    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (HRIS)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js HMR (dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}


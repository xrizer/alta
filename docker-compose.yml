services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hris
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hris-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hris-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Go Backend
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: hris-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: hris
      DB_SSLMODE: disable
      JWT_SECRET: hris-jwt-secret-prod-change-me
      JWT_REFRESH_SECRET: hris-jwt-refresh-secret-prod-change-me
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 168h
      APP_PORT: 8080
      CORS_ORIGINS: https://altahris.com,https://www.altahris.com,http://localhost:3000
      ADMIN_EMAIL: admin@hris.com
      ADMIN_PASSWORD: admin123
      KAFKA_BROKERS: kafka:29092
      SIGNOZ_ENDPOINT: http://signoz-otel-collector:4318
      SIGNOZ_ACCESS_TOKEN: ""
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      signoz-otel-collector:
        condition: service_started

  # Next.js Frontend
  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: hris-frontend
    restart: unless-stopped
    environment:
      SIGNOZ_ENDPOINT: http://signoz-otel-collector:4318
      SIGNOZ_ACCESS_TOKEN: ""
    ports:
      - '3000:3000'
    depends_on:
      - backend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hris-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
      - signoz-frontend

  # ---------------------------------------------------------------------------
  # SigNoz — Observability (error logging via OTLP)
  # UI: http://<your-vm-ip>:3301
  # ---------------------------------------------------------------------------

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: signoz-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - signoz_clickhouse:/var/lib/clickhouse
      - ./signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./signoz/clickhouse-users.xml:/etc/clickhouse-server/users.d/z-signoz-users.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  signoz-schema-migrator:
    image: signoz/signoz-schema-migrator:latest
    container_name: signoz-schema-migrator
    command:
      - "sync"
      - "--dsn=tcp://clickhouse:9000"
      - "--dev"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: signoz-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-schema-migrator:
        condition: service_completed_successfully

  signoz-query-service:
    image: signoz/query-service:latest
    container_name: signoz-query-service
    restart: unless-stopped
    environment:
      SIGNOZ_TELEMETRYSTORE_PROVIDER: clickhouse
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      GODEBUG: netdns=go
      DEPLOYMENT_TYPE: docker-standalone
    volumes:
      - signoz_sqlite:/var/lib/signoz
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-schema-migrator:
        condition: service_completed_successfully

  signoz-frontend:
    image: signoz/frontend:latest
    container_name: signoz-frontend
    restart: unless-stopped
    ports:
      - "3301:3301"
    depends_on:
      - signoz-query-service

volumes:
  postgres_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  signoz_clickhouse:
  signoz_sqlite:
